<title>Highlights - Cravings To Go</title>

<style>
/* GLOBAL */
*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:"Roboto",Arial,sans-serif;
  background:#fff4e8;
}

/* HEADINGS */
h1, h2, h3{
  font-family: 'Fredoka', sans-serif;
}

h1{
  font-size:clamp(28px,4vw,46px);
}

h2{
  font-size:clamp(24px,3vw,34px);
}

h3{
  font-size:20px;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:65px;
  background:#ff2f86;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 30px;
  z-index:1000;
}

.nav-logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:white;
  text-decoration:none;
  font-family:"Oswald";
}

.logo{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

.nav-links a{
  color:white;
  text-decoration:none;
  font-family:'Fredoka';
}

/* SECTION */
section{
  text-align:center;
}

/* FIXED BACKGROUND */
.menu{
 width:100vw;                 /* full screen width */
  margin-left:calc(-50vw + 50%); /* breaks out of centered layout */
  min-height:100vh; /* THIS FIXES THE EMPTY SPACE */

  background:
    linear-gradient(rgba(245,243,244,0.9), rgba(245,243,244,0.9)),
    url("https://scontent.fmnl17-8.fna.fbcdn.net/v/t39.30808-6/653710890_1339243471564751_1382818684277726793_n.jpg?stp=cp6_dst-jpg_tt6&_nc_cat=107&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeGRIZJ51eY3TLJFqLRCW2zP5XDotdvE8ZvlcOi128Txm8vHdP0_Z-HS5pvQtE0oYDGnrQeI79FBmrNtJBf0xQrB&_nc_ohc=sTlp5crwfs0Q7kNvwHFRccu&_nc_oc=Adk-ko2KjBFHjSQNTm8XPoPuBaCxWo89E9SBqlD_te2Piujmsa2X05X58ajQ5wnFh4U&_nc_zt=23&_nc_ht=scontent.fmnl17-8.fna&_nc_gid=7yKE_3OxSnZ6EEW5GQGkig&_nc_ss=8&oh=00_AfwXJIzGYM98gq9Qruv8TyYGTyPKPHMahsB09ADsRcgLLg&oe=69C0616");
  background-size:cover;
    background-position:center;

  padding:60px 20px;


  display:flex;
  flex-direction:column;
  justify-content:center; /* centers content vertically */


}

/* GRID */
.subject-card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:25px;
  margin-top:30px;
}

/* CARDS */
.subject-card{
  background:#ff2f86;
  color:white;
  border-radius:15px;
  padding:20px;
  transition:.25s;
}

.subject-card:hover{
  transform:translateY(-5px) scale(1.03);
  background:#ff5aa3;
}

/* IMAGES */
.food-img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

/* MOBILE */
@media(max-width:600px){
  .navbar{
    padding:10px;
  }
}


</style>
</head>


<script>

function revealOnScroll(){

let reveals = document.querySelectorAll(".reveal");

for(let i = 0; i < reveals.length; i++){

let windowHeight = window.innerHeight;
let elementTop = reveals[i].getBoundingClientRect().top;
let revealPoint = 120;

if(elementTop < windowHeight - revealPoint){
reveals[i].classList.add("active");
}

}

}

window.addEventListener("scroll", revealOnScroll);


</script>
